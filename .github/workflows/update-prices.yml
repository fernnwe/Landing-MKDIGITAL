name: Update Prices Daily

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm run update-prices

      - name: Commit and push if changed
        run: |
          git config user.name "mkdigital-bot"
          git config user.email "bot@mkdigitalnic.com"
          git add src/data/prices.ts
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto-update prices $(date -u +%Y-%m-%d)"
            git push
          fi
